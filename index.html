<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- <meta name=viewport content='width=device-width,initial-scale=1,user-scalable=0'> -->
<title>Wordos</title>
<style>
  body {
    background: #222;
    color: #eee;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px;
  }
  #topBar {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    align-items: center;
  }
  #board {
    border-collapse: collapse;
    margin-bottom: 10px;
  }
  #board td {
    width: 32px;
    height: 32px;
    border: 1px solid #555;
    text-align: center;
    vertical-align: middle;
    font-size: 18px;
    cursor: pointer;
    position: relative;
  }
  #rack {
    display: flex;
    gap: 5px;
    margin-bottom: 10px;
  }
  .tile {
    width: 32px;
    height: 32px;
    border-radius: 4px;
    background: #caa472;
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    cursor: pointer;
    position: relative;
  }
  .tile span.value {
    position: absolute;
    bottom: 2px;
    right: 3px;
    font-size: 10px;
  }
  button {
    padding: 6px 12px;
    font-size: 14px;
  }
  #log {
    max-width: 600px;
    font-size: 13px;
    margin-top: 10px;
  }
</style>
</head>
<body>

<div id="topBar">
  <button id="newGameBtn">New Game</button>
  <button id="playWordBtn">Play Word</button>
  <span>Score: <span id="score">0</span></span>
</div>

<table id="board"></table>

<div id="rack"></div>

<div id="log"></div>

<script src="wordos.js"></script>

</body>
</html>
